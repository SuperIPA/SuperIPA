<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Super IPA">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Super IPA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background: #0D0D0F;
            color: #fff;
            min-height: 100vh;
            padding: 60px 25px 20px;
            text-align: center;
        }
        .app_box {
            max-width: 420px;
            margin: 0 auto;
        }
        .app_icon {
            width: 100px;
            height: 100px;
            border-radius: 22px;
            margin: 0 auto 20px;
            overflow: hidden;
        }
        .app_icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .app_name {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #007BFF;
        }
        .app_desc {
            font-size: 14px;
            color: #8F8F93;
            margin-bottom: 30px;
        }
        .lang_select {
            padding: 8px 12px;
            background: #1C1C1E;
            color: #fff;
            border: 1px solid #007BFF;
            border-radius: 10px;
            margin-bottom: 30px;
            font-size: 15px;
        }
        .status_card {
            background: #1C1C1E;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
        }
        .status_title {
            font-size: 16px;
            color: #8F8F93;
            margin-bottom: 8px;
        }
        .status_text {
            font-size: 20px;
            font-weight: 600;
            color: #00FF77;
        }
        .btn_main {
            display: block;
            width: 100%;
            padding: 18px;
            background: #007BFF;
            color: white;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            margin-bottom: 12px;
        }
        .btn_alt {
            display: block;
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #007BFF;
            font-size: 15px;
            border: 1px solid #007BFF;
            border-radius: 12px;
        }
        .bottom_tip {
            font-size: 12px;
            color: #636366;
            margin-top: 40px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
<div class="app_box">
    <div class="app_icon">
        <img src="https://img.remit.ee/api/file/BQACAgUAAyEGAASHRsPbAAESpI9p0cdVeZ5F13OYGmtsjcGyafpr6gAClB8AAlDQiFaQhIOJM79H8DsE.jpeg">
    </div>
    
    <div class="app_name" id="app_title">Super IPA</div>
    <div class="app_desc" id="app_sub">Auto ReSign · Anti Revoke</div>

    <select class="lang_select" id="langSwitch" onchange="changeLang()">
        <option value="en" selected>English</option>
        <option value="cn">中文</option>
    </select>

    <div class="status_card">
        <div class="status_title" id="status_label">Signature Status</div>
        <div class="status_text" id="status_txt">Loading...</div>
    </div>

    <button class="btn_main" onclick="startResign()" id="btn_resign">Install / ReSign</button>
    <button class="btn_alt" onclick="resetTime()" id="btn_reset">Reset Time</button>

    <div class="bottom_tip" id="footer_txt">
        Local Only · No Jailbreak<br>
        iOS 26 Supported · Open Source
    </div>
</div>

<script>
const KEY = "super_ipa_last_resign";
const SEVEN_DAYS = 7 * 24 * 60 * 60 * 1000;
const IPA_URL = "https://cdn.ipafy.top/SuperIPA.ipa";

const lang = {
    en: {
        title: "Super IPA",
        sub: "Auto ReSign · Anti Revoke",
        status: "Signature Status",
        btnResign: "Install / ReSign",
        btnReset: "Reset Time",
        footer: "Local Only · No Jailbreak\niOS 26 Supported · Open Source",
        normal: "Normal · Remain",
        expireSoon: "Expire Soon · Remain",
        expired: "Expired · Please ReSign"
    },
    cn: {
        title: "Super IPA",
        sub: "自动续签 · 防掉签工具",
        status: "签名状态",
        btnResign: "立即安装 / 续签",
        btnReset: "重置续签时间",
        footer: "纯本地运行 · 无需越狱\niOS 26 可用 · 免费开源",
        normal: "正常 · 剩余",
        expireSoon: "即将过期 · 剩余",
        expired: "已过期 · 请续签"
    }
};

let currentLang = "en";

function changeLang() {
    currentLang = document.getElementById("langSwitch").value;
    applyLang();
    updateUI();
}

function applyLang() {
    const l = lang[currentLang];
    document.getElementById("app_title").innerText = l.title;
    document.getElementById("app_sub").innerText = l.sub;
    document.getElementById("status_label").innerText = l.status;
    document.getElementById("btn_resign").innerText = l.btnResign;
    document.getElementById("btn_reset").innerText = l.btnReset;
    document.getElementById("footer_txt").innerText = l.footer;
}

function now() { return Date.now(); }
function setTime() { localStorage.setItem(KEY, now()); }
function getTime() {
    let t = localStorage.getItem(KEY);
    if(!t) { setTime(); return now(); }
    return parseInt(t);
}

function getRemain() {
    let pass = now() - getTime();
    let left = SEVEN_DAYS - pass;
    if(left < 0) return 0;
    return (left / (1000*60*60*24)).toFixed(1);
}

function updateUI() {
    let r = getRemain();
    let s = document.getElementById("status_txt");
    let l = lang[currentLang];

    if(r <= 0) {
        s.innerText = l.expired;
        s.style.color = "#FF3B30";
    } else if(r <= 1) {
        s.innerText = `${l.expireSoon} ${r}d`;
        s.style.color = "#FF9500";
    } else {
        s.innerText = `${l.normal} ${r}d`;
        s.style.color = "#00FF77";
    }
}

function startResign() {
    setTime();
    updateUI();
    window.location.href = IPA_URL;
}

function resetTime() {
    setTime();
    updateUI();
    alert(currentLang === "cn" ? "重置成功" : "Reset Success");
}

window.onload = function() {
    applyLang();
    updateUI();
    setInterval(updateUI, 60000);
}
</script>
</body>
</html>
