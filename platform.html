<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Super IPA - Platform</title>
<link rel="apple-touch-icon" href="https://p.66sy.com/2026/04/03/666666.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
body {
background: #121212;
padding: 20px;
max-width: 400px;
margin: 0 auto;
color: #fff;
}
.box {
background: #1c1c1e;
border-radius: 16px;
padding: 30px 25px;
margin: 20px 0;
border: 0.5px solid #3a3a3c;
text-align: center;
}
.title {
font-size: 28px;
font-weight: 800;
color: #fff;
margin-bottom: 20px;
}
.lang-select {
width: 100%;
padding: 10px;
border-radius: 12px;
border: 1px solid #3a3a3c;
margin-bottom: 20px;
font-size: 15px;
background: #2c2c2e;
color: #fff;
outline: none;
}
.item {
background: #2c2c2e;
color: #fff;
padding: 16px;
border-radius: 12px;
margin: 10px 0;
font-size: 16px;
font-weight: 500;
cursor: pointer;
transition: 0.2s;
text-align: left;
}
.item:active {
background: #3a3a3c;
transform: scale(0.97);
}
.plus {
font-size: 20px;
font-weight: bold;
color: #007aff;
margin-right: 8px;
vertical-align: middle;
}
.tip {
font-size: 12px;
color: #8e8e93;
margin-top: 5px;
text-align: left;
}
.btn {
background: #007aff;
color: white;
padding: 14px;
border-radius: 12px;
margin: 10px 0;
font-size: 16px;
cursor: pointer;
transition: 0.2s;
}
.btn:active {
transform: scale(0.97);
}
#fileInput {
display: none;
}
.result {
margin-top: 15px;
font-size: 14px;
color: #007aff;
line-height: 1.4;
text-align: center;
}
.progress-bar {
width: 100%;
height: 6px;
background: #2c2c2e;
border-radius: 3px;
margin-top: 12px;
overflow: hidden;
display: none;
}
.progress {
height: 100%;
width: 0%;
background: #007aff;
border-radius: 3px;
transition: width 0.05s;
}
.modal {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0, 0.8);
display: none;
justify-content: center;
align-items: center;
padding: 20px;
z-index: 999;
}
.modal-box {
background: #1c1c1e;
border-radius: 16px;
padding: 25px;
width: 100%;
max-width: 350px;
text-align: center;
border: 1px solid #3a3a3c;
}
.modal-title {
font-size: 20px;
font-weight: bold;
color: #fff;
margin-bottom: 15px;
}
.modal-desc {
color: #8e8e93;
font-size: 14px;
background: #121212;
padding: 10px;
border-radius: 8px;
margin-bottom: 20px;
line-height: 1.5;
}
.modal-btn {
background: #007aff;
color: #fff;
padding: 12px;
border-radius: 12px;
font-size: 15px;
}
.installReal {
background: linear-gradient(135deg, #007aff 0%, #0056cc 100%);
color: #fff;
padding: 14px;
border-radius: 12px;
margin: 10px 0;
font-size: 16px;
cursor: pointer;
font-weight: 600;
box-shadow: 0 4px 12px rgba(0,122,255,0.3);
}
.dnsProfile {
background: #34c759;
color: #fff;
padding: 14px;
border-radius: 12px;
margin: 10px 0;
font-size: 16px;
cursor: pointer;
font-weight: 600;
box-shadow: 0 4px 12px rgba(52,199,89,0.3);
}
</style>
</head>
<body>

<div class="box">
    <div class="title" id="platformTitle">Platform</div>

    <select class="lang-select" id="langSwitch">
        <option value="en" selected>English</option>
        <option value="zh">中文</option>
    </select>

    <div class="item" onclick="document.getElementById('fileInput').click()" id="m1">
        <span class="plus">+</span> Import IPA
    </div>
    <div class="tip" id="tipText">Only .ipa files can be selected</div>
    <input type="file" id="fileInput" accept=".ipa">

    <div class="progress-bar" id="progressBar">
        <div class="progress" id="progress"></div>
    </div>

    <div class="dnsProfile" onclick="installDNS()">🛡️ Install Anti-Revoke Profile</div>

    <div class="installReal" onclick="installIPA()">📲 Real Install APP (Real Install)</div>

    <div class="item" onclick="openVideo()" id="m2">Super IPA Tutorial</div>
    <div class="item" onclick="openFix()" id="m3">⚙️ Fix Crash</div>
    <div class="item" onclick="openDevice()" id="m4">ℹ️ Device Info</div>

    <div class="btn" onclick="back()" id="backBtn">Back to Home</div>
    <div id="result" class="result"></div>
</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <div class="modal-title" id="modalTitle">Tutorial</div>
        <div class="modal-desc" id="modalDesc"></div>
        <div class="modal-btn" onclick="closeModal()">Close</div>
    </div>
</div>

<script>
function back() {
    window.location.href = "index.html";
}
const fileInput = document.getElementById('fileInput');
const result = document.getElementById('result');
const lang = document.getElementById('langSwitch');
const progressBar = document.getElementById('progressBar');
const progress = document.getElementById('progress');
const modal = document.getElementById('modal');

function installIPA() {
    const plistUrl = "https://superipa.github.io/SuperIPA/manifest.plist";
    result.textContent = lang.value == 'zh' ? '📲 正在唤起安装…请稍等' : '📲 Calling install… Please wait';
    setTimeout(() => {
        window.location.href = `itms-services://?action=download-manifest&url=${encodeURIComponent(plistUrl)}`;
    }, 800);
}

function installDNS() {
    const profileUrl = "https://superipa.github.io/SuperIPA/SuperIPA-VPN.mobileconfig";
    result.textContent = lang.value == 'zh' ? '📲 打开描述文件安装' : '📲 Open Profile to Install';
    setTimeout(() => {
        window.location.href = profileUrl;
    }, 600);
}

lang.addEventListener('change', function() {
    if(this.value == 'zh') {
        document.getElementById('platformTitle').innerText = "功能平台";
        document.getElementById('tipText').innerText = "仅可选择 .ipa 格式文件";
        document.getElementById('m1').innerHTML = "<span class='plus'>+</span> 导入IPA";
        document.querySelector('.dnsProfile').innerText = "🛡️ 安装防掉签描述文件";
        document.querySelector('.installReal').innerText = "📲 真实安装APP";
        document.getElementById('m2').innerText = "使用教程";
        document.getElementById('m3').innerText = "⚙️ 修复闪退";
        document.getElementById('m4').innerText = "ℹ️ 设备信息";
        document.getElementById('backBtn').innerText = "返回主页";
        document.querySelector('.modal-btn').innerText = "关闭";
    } else {
        document.getElementById('platformTitle').innerText = "Platform";
        document.getElementById('tipText').innerText = "Only .ipa files can be selected";
        document.getElementById('m1').innerHTML = "<span class='plus'>+</span> Import IPA";
        document.querySelector('.dnsProfile').innerText = "🛡️ Install Anti-Revoke Profile";
        document.querySelector('.installReal').innerText = "📲 Real Install APP";
        document.getElementById('m2').innerText = "Super IPA Tutorial";
        document.getElementById('m3').innerText = "⚙️ Fix Crash";
        document.getElementById('m4').innerText = "ℹ️ Device Info";
        document.getElementById('backBtn').innerText = "Back to Home";
        document.querySelector('.modal-btn').innerText = "Close";
    }
});

fileInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.name.toLowerCase().endsWith('.ipa')) {
        fileInput.value = '';
        result.textContent = lang.value == 'zh' ? '❌ 仅支持IPA文件' : '❌ Only IPA files are allowed';
        return;
    }
    progressBar.style.display = 'block';
    progress.style.width = '0%';
    result.textContent = lang.value == 'zh' ? '⏳ 正在读取IPA文件...' : '⏳ Loading IPA file...';
    let width = 0;
    let interval = setInterval(() => {
        width += 2;
        progress.style.width = width + '%';
        if (width >= 100) {
            clearInterval(interval);
            if (navigator.vibrate) navigator.vibrate(30);
            result.textContent = lang.value == 'zh' 
                ? '✅ IPA文件已选择：\n' + file.name 
                : '✅ IPA File Selected:\n' + file.name;
        }
    }, 20);
});

function openVideo() {
    modal.style.display = 'flex';
    if(lang.value == 'zh') {
        modalTitle.innerText = "使用教程";
        modalDesc.innerText = "1. 安装防掉签描述文件\n2. 点击真实安装APP\n3. 等待桌面安装完成\n4. 正常使用应用";
    } else {
        modalTitle.innerText = "Tutorial";
        modalDesc.innerText = "1. Install Anti-Revoke Profile\n2. Tap Real Install APP\n3. Wait for installation\n4. Open and use";
    }
}

function openFix(){
    modal.style.display = 'flex';
    if(lang.value == 'zh') {
        modalTitle.innerText = "修复闪退";
        modalDesc.innerText = "1. 重新安装描述文件\n2. 信任证书\n3. 重启应用";
    } else {
        modalTitle.innerText = "Fix Crash";
        modalDesc.innerText = "1. Reinstall Profile\n2. Trust Certificate\n3. Restart App";
    }
}

function openDevice(){
    modal.style.display = 'flex';
    if(lang.value == 'zh') {
        modalTitle.innerText = "设备信息";
        modalDesc.innerText = "当前设备：" + (navigator.userAgent || "iPhone") + "\n系统版本：iOS " + (navigator.appVersion.match(/OS (\d+)_(\d+)_?(\d+)?/)[1] || "16");
    } else {
        modalTitle.innerText = "Device Info";
        modalDesc.innerText = "Current Device: " + (navigator.userAgent || "iPhone") + "\nSystem Version: iOS " + (navigator.appVersion.match(/OS (\d+)_(\d+)_?(\d+)?/)[1] || "16");
    }
}

function closeModal(){
    modal.style.display = 'none';
}
</script>
</body>
</html>
