<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>页面已锁定</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
/* 顶级锁屏遮罩 压死所有内容 */
#lockScreen{
    position:fixed;
    inset:0;
    background:#0a0a12;
    z-index:999999999;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}
.lock-title{
    color:#00e5ff;
    font-size:28px;
    margin-bottom:40px;
    letter-spacing:3px;
}
#pwd{
    width:280px;
    height:50px;
    background:#151522;
    border:1px solid #00e5ff;
    border-radius:10px;
    color:#fff;
    font-size:18px;
    text-align:center;
    outline:none;
}
#btn{
    margin-top:25px;
    width:140px;
    height:45px;
    background:#0099cc;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}
#btn:active{opacity:0.8;}
</style>
</head>
<body>

<!-- 你的正常网页内容放这里 -->
<h1>正常页面内容</h1>

<!-- 强制锁屏层 -->
<div id="lockScreen">
    <div class="lock-title">系统已锁定</div>
    <input type="password" id="pwd" placeholder="输入解锁密码">
    <button id="btn">确认解锁</button>
</div>

<script>
// 自行修改解锁密码
const PASSWD = "123321";
const lock = document.getElementById("lockScreen");
const pwdInp = document.getElementById("pwd");
const btn = document.getElementById("btn");

// 1.禁止ESC关闭
document.onkeydown = e => {
    if(e.keyCode === 27) return false;
    // 禁止F5刷新
    if(e.keyCode === 116) return false;
    // 禁止F12查看源码
    if(e.keyCode === 123) return false;
};

// 2.禁用右键
document.oncontextmenu = () => false;

// 3.拦截浏览器后退
history.pushState(null, null, location.href);
window.onpopstate = () => history.pushState(null, null, location.href);

// 4.禁止离开页面
window.onbeforeunload = () => "页面已锁定，无法退出！";

// 解锁逻辑
function unlock(){
    if(pwdInp.value === PASSWD){
        lock.style.display = "none";
        // 解锁后解除所有限制
        document.onkeydown = null;
        document.oncontextmenu = null;
        window.onbeforeunload = null;
    }else{
        alert("密码错误，无法解锁！");
        pwdInp.value = "";
    }
}

btn.onclick = unlock;
// 回车快速解锁
pwdInp.onkeydown = e => e.key === "Enter" && unlock();
</script>
</body>
</html>
