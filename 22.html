<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI对话助手</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;}
        body{background:#0f1118;color:#eee;height:100vh;display:flex;flex-direction:column;}
        .header{padding:15px;text-align:center;border-bottom:1px solid #222;background:#161a23;}
        .chat-box{flex:1;padding:20px;overflow-y:auto;}
        .msg{max-width:80%;margin:12px 0;padding:12px 16px;border-radius:12px;line-height:1.6;}
        .user{background:#2563eb;margin-left:auto;}
        .ai{background:#1f2937;margin-right:auto;}
        .input-area{display:flex;padding:15px;border-top:1px solid #222;background:#161a23;gap:10px;}
        #input{flex:1;padding:12px 15px;border:none;border-radius:30px;background:#242b38;color:#fff;outline:none;font-size:15px;}
        #send{padding:12px 25px;border:none;border-radius:30px;background:#2563eb;color:#fff;cursor:pointer;font-weight:bold;}
        #send:hover{background:#1d4ed8;}
        .loading{color:#999;text-align:center;margin:10px;display:none;}
    </style>
</head>
<body>
    <div class="header">
        <h2>AI智能助手</h2>
        <p>免费极速对话 · 无需登录</p>
    </div>
    <div class="chat-box" id="chat"></div>
    <div class="loading" id="load">AI思考中...</div>
    <div class="input-area">
        <input type="text" id="input" placeholder="输入问题发送..." autocomplete="off">
        <button id="send">发送</button>
    </div>

<script>
// 稳定可用接口
const API_URL = "https://chatapi.littlewheat.com/v1/chat/completions";
const API_KEY = "sk-littlewheat123";
const model = "gpt-3.5-turbo";

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const send = document.getElementById('send');
const load = document.getElementById('load');

function addMsg(text,isUser){
    let div = document.createElement('div');
    div.className = `msg ${isUser?'user':'ai'}`;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function getAIReply(text){
    load.style.display = "block";
    try{
        let res = await fetch(API_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":`Bearer ${API_KEY}`
            },
            body:JSON.stringify({
                model:model,
                messages:[{"role":"user","content":text}]
            })
        })
        let data = await res.json();
        load.style.display = "none";
        return data.choices[0].message.content;
    }catch(e){
        load.style.display = "none";
        return "接口繁忙，稍等重试~";
    }
}

send.onclick = async ()=>{
    let txt = input.value.trim();
    if(!txt)return;
    addMsg(txt,true);
    input.value = "";
    let res = await getAIReply(txt);
    addMsg(res,false);
}
input.onkeydown = e=>e.key==="Enter"&&send.click();

addMsg("你好呀！我是AI助手，随时可以问我问题~",false);
</script>
</body>
</html>
